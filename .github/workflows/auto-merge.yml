name: Auto-merge

# Hands-free merge for TRUSTED authors only. Copied from synthwatch-api's auto-merge.yml, with the
# post-merge Deploy dispatch DROPPED — monitors does not deploy: a merge to main reaches production via
# the runner's GitOps reconcile of synthwatch-monitors, not a repo deploy.
#
# This is a PUBLIC repo whose main drives what production monitoring ASSERTS, so merge authorization is a
# security property: checks passing is necessary but NOT sufficient — the author must be on the trusted
# allowlist below. Untrusted authors' PRs are never auto-merged, no matter how green (this job does not run).
#
# Mechanism: GitHub *native* auto-merge (`gh pr merge --auto`). Unlike an immediate merge, --auto tells
# GitHub to HOLD the merge until every required status check passes — so it cooperates with branch
# protection (the required "Check" status) instead of racing/failing it. Requires allow_auto_merge=true.

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    name: Auto-merge (trusted authors)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # One poller per PR: a new push cancels the previous run so we don't stack waiters.
    concurrency:
      group: auto-merge-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    # ★ TRUST GATE (hard, deterministic — NOT an LLM decision). BOTH conditions required: base branch is
    # `main`, AND the author is on the allowlist — only the operator (craigoley / cao825), the agent
    # (craigoleyagent), and dependabot[bot] may auto-merge. Any other author, OR any base other than main
    # -> this job is skipped -> the PR NEVER auto-merges. base==main closes the stacked-PR hole (a PR based
    # on an unprotected feature branch would otherwise auto-merge there with no required checks; runner #192).
    if: github.event.pull_request.base.ref == 'main' && contains(fromJSON('["craigoley", "cao825", "craigoleyagent", "dependabot[bot]"]'), github.event.pull_request.user.login)
    steps:
      - name: Enable native auto-merge (waits for the required "Check")
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr merge --auto --squash --delete-branch "${{ github.event.pull_request.number }}" --repo "${{ github.repository }}"
