name: Check

# Gate every monitor PR: the manifest stays in sync with the scripts, the
# scripts type-check, and every script parses as a valid Playwright test. A
# broken monitor script must NOT reach main (and therefore must not sync to
# SynthWatch prod). Same governance posture as the other SynthWatch repos.
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install
        run: npm ci || npm install
      - name: Install Playwright (deps only, no browsers needed for --list)
        run: npx playwright install-deps || true
      - name: Validate manifest (JSON schema via ajv + registry <-> scripts in sync)
        run: npm run validate:manifest
      - name: Fetch runner shim (live source of truth for implemented expect matchers)
        # The shim single-sources its implemented matchers in SUPPORTED_MATCHERS
        # (synthwatch@main runner/specfetch/specShim.ts, public repo). A failed fetch
        # HARD-FAILS this job. Silently falling back to the committed snapshot (the old
        # behavior) would let the allowlist drift out of sync with the shim INDEFINITELY
        # with nobody noticing — a false-green. So if the shim moves/renames, the gate
        # goes RED here loudly. A transient network blip is acceptable: re-run the job.
        run: |
          URL="https://raw.githubusercontent.com/craigoley/synthwatch/main/runner/specfetch/specShim.ts"
          if ! curl --fail -sSL --retry 3 --retry-delay 2 "$URL" -o "$RUNNER_TEMP/specShim.ts"; then
            echo "::error title=Matcher gate: runner shim fetch FAILED::Could not fetch the runner shim from $URL (curl --fail: HTTP error / 404). MOST LIKELY the shim moved or was renamed in the runner repo (runner/specfetch/specShim.ts) — update the URL above in .github/workflows/check.yml to match. If this is a transient network blip, re-run the job. Failing CLOSED (hard error) so the matcher allowlist can never silently freeze on the committed snapshot." >&2
            exit 1
          fi
      - name: Matcher allowlist + banned-pattern gate
        run: npm run check:matchers
        env:
          SHIM_SOURCE: ${{ runner.temp }}/specShim.ts
      - name: Typecheck
        run: npm run typecheck
      - name: Compile-check scripts (every spec parses + lists)
        run: npx playwright test --list
